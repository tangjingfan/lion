# ============================================================
#  LION-Bench — Sub-path partition config
# ============================================================
#
# The partition splits each sub-trajectory into a spatial portion
# (the first short stretch from the start) and a landmark portion
# (the remainder, walking to the landmark).

# ── Turn detection (degrees) ───────────────────────────────────
# With rollout frames, signed TURN_LEFT / TURN_RIGHT heading changes are
# accumulated. A sub-path is treated as "with turn" only when |cumulative
# turn| crosses this threshold before the forward-distance cutoff.
turn_thresh_deg:   45.0    # |cumulative turn| >= 45° qualifies as a turn
around_thresh_deg: 120.0   # |cumulative turn| >= 120° is "turn around"

# ── Forward distance (metres) ──────────────────────────────────
# With rollout frames: if the signed cumulative turn crosses the threshold,
# start from that crossing step and walk this far before cutting. If not,
# cut after this much motion from the start of the rollout sub-path segment.
# Without rollout frames, this is applied along the reference sub-path.
# 0.5 m gives one short forward step past the turn — far enough that
# doorframes / wall corners no longer occlude the destination, short
# enough to keep the partition pose near the "read instruction" moment.
forward_distance_m: 0.5
